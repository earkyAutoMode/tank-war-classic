<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tank War Classic</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #333;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid #555;
            background-color: #000;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        #game-info {
            position: absolute;
            top: 0;
            left: 530px;
            width: 120px;
            height: 520px;
            background-color: #444;
            padding: 10px;
            box-sizing: border-box;
            border-left: 4px solid #555;
        }

        .info-item {
            margin-bottom: 20px;
            font-size: 16px;
            border-bottom: 1px solid #666;
            padding-bottom: 5px;
        }

        button {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
        }

        button:hover {
            background-color: #c0392b;
        }

        h1 { margin: 0; font-size: 48px; color: #f1c40f; }
        p { margin: 5px 0; }
        .controls { margin-top: 30px; font-size: 14px; color: #aaa; text-align: center; }
        
        .stat-val {
            color: #f1c40f;
            font-weight: bold;
            display: block;
            font-size: 24px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="520" height="520"></canvas>
        <div id="game-info">
            <div class="info-item">SCORE<span id="score-val" class="stat-val">0</span></div>
            <div class="info-item">ENEMIES<span id="enemy-count" class="stat-val">0</span></div>
            <div class="info-item">STAGE<span class="stat-val">1</span></div>
        </div>
        <div id="ui-layer">
            <div id="start-screen" class="overlay">
                <h1>TANK WAR</h1>
                <p>CLASSIC EDITION</p>
                <button id="start-btn">START GAME</button>
                <div class="controls">
                    <p>WASD / Arrows to Move</p>
                    <p>Space to Shoot</p>
                </div>
            </div>
            <div id="end-screen" class="overlay hidden">
                <h1 id="end-title">GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <button id="restart-btn">PLAY AGAIN</button>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
